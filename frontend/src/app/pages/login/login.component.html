<div class="login-page">
  <div class="login-card">

  <!-- ─── Brand ─── -->
  <div class="login-brand">
    <img
      class="login-brand__logo"
      src="images/logo.svg"
      alt="Domia"
      width="160"
      height="48"
    />
    <p class="login-brand__tagline">Inicia sesión para continuar</p>
  </div>

    <!-- ─── Divider ─── -->
    <div class="login-divider"></div>

    <!-- ─── Form ─── -->
    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="login-form">

      <div class="form-group">
        <label class="form-label" for="username">Usuario</label>
        <div class="input-wrapper">
          <svg class="input-wrapper__icon icon-16" xmlns="http://www.w3.org/2000/svg"
               fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round"
                  d="M15.75 6a3.75 3.75 0 1 1-7.5 0
                     3.75 3.75 0 0 1 7.5 0ZM4.501
                     20.118a7.5 7.5 0 0 1 14.998
                     0A17.933 17.933 0 0 1 12 21.75c-2.676
                     0-5.216-.584-7.499-1.632Z"/>
          </svg>
          <input
            id="username"
            class="form-input form-input--icon"
            type="text"
            formControlName="username"
            autocomplete="username"
            placeholder="Ingresa tu usuario"
          />
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Contraseña</label>
        <div class="input-wrapper">
          <svg class="input-wrapper__icon icon-16" xmlns="http://www.w3.org/2000/svg"
               fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round"
                  d="M16.5 10.5V6.75a4.5 4.5 0
                     1 0-9 0v3.75m-.75 11.25h10.5a2.25
                     2.25 0 0 0 2.25-2.25v-6.75a2.25
                     2.25 0 0 0-2.25-2.25H6.75a2.25
                     2.25 0 0 0-2.25 2.25v6.75a2.25
                     2.25 0 0 0 2.25 2.25Z"/>
          </svg>
          <input
            id="password"
            class="form-input form-input--icon form-input--password"
            [type]="showPassword ? 'text' : 'password'"
            formControlName="password"
            autocomplete="current-password"
            placeholder="Ingresa tu contraseña"
          />
          <button
            type="button"
            class="input-wrapper__toggle"
            (click)="togglePassword()"
            [attr.aria-label]="showPassword ? 'Ocultar contraseña' : 'Mostrar contraseña'"
          >
            @if (showPassword) {
              <!-- Eye slash (ocultar) -->
              <svg class="icon-16" xmlns="http://www.w3.org/2000/svg" fill="none"
                   viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round"
                      d="M3.98 8.223A10.477 10.477 0 0 0
                         1.934 12c1.292 4.338 5.31 7.5
                         10.066 7.5.993 0 1.953-.138
                         2.863-.395M6.228 6.228A10.451
                         10.451 0 0 1 12 4.5c4.756 0
                         8.773 3.162 10.065 7.498a10.522
                         10.522 0 0 1-4.293 5.774M6.228
                         6.228 3 3m3.228 3.228 3.65
                         3.65m7.894 7.894L21 21m-3.228
                         -3.228-3.65-3.65m0 0a3 3 0 1
                         0-4.243-4.243m4.242 4.242L9.88
                         9.88"/>
              </svg>
            } @else {
              <!-- Eye (mostrar) -->
              <svg class="icon-16" xmlns="http://www.w3.org/2000/svg" fill="none"
                   viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round"
                      d="M2.036 12.322a1.012 1.012 0 0
                         1 0-.639C3.423 7.51 7.36 4.5 12
                         4.5c4.638 0 8.573 3.007 9.963
                         7.178.07.207.07.431 0 .639C20.577
                         16.49 16.64 19.5 12 19.5c-4.638
                         0-8.573-3.007-9.964-7.178Z"/>
                <path stroke-linecap="round" stroke-linejoin="round"
                      d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"/>
              </svg>
            }
          </button>
        </div>
      </div>

      <button
        type="submit"
        class="btn btn--primary btn--login"
        [disabled]="(form.invalid && !autofilled) || submitting"
      >
        @if (submitting) {
          <svg class="icon-16 spin" xmlns="http://www.w3.org/2000/svg" fill="none"
               viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round"
                  d="M16.023 9.348h4.992v-.001M2.985
                     19.644v-4.992m0 0h4.992m-4.993
                     0 3.181 3.183a8.25 8.25 0 0 0
                     13.803-3.7M4.031 9.865a8.25 8.25
                     0 0 1 13.803-3.7l3.181 3.182"/>
          </svg>
          Entrando…
        } @else {
          <svg class="icon-16" xmlns="http://www.w3.org/2000/svg" fill="none"
               viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round"
                  d="M15.75 9V5.25A2.25 2.25 0 0 0
                     13.5 3h-6a2.25 2.25 0 0 0-2.25
                     2.25v13.5A2.25 2.25 0 0 0 7.5
                     21h6a2.25 2.25 0 0 0 2.25-2.25V15m3
                     0 3-3m0 0-3-3m3 3H9"/>
          </svg>
          Entrar
        }
      </button>
    </form>

    <!-- ─── Error toast ─── -->
    @if (error) {
      <div class="toast toast--error">
        <svg class="icon-16" xmlns="http://www.w3.org/2000/svg" fill="none"
             viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round"
                d="M12 9v3.75m-9.303 3.376c-.866
                   1.5.217 3.374 1.948 3.374h14.71c1.73
                   0 2.813-1.874 1.948-3.374L13.949
                   3.378c-.866-1.5-3.032-1.5-3.898
                   0L2.697 16.126ZM12 15.75h.007v.008H12v-.008Z"/>
        </svg>
        {{ error }}
      </div>
    }

    <!-- ─── Footer ─── -->
    <div class="login-footer">
      <span class="login-footer__brand">Inmovision Labs</span>
      <span class="login-footer__copy">&copy; {{ currentYear }}</span>
    </div>
  </div>
</div>
